<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天气预报</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #0a1628;
  --bg2: #0d1f3c;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #e8f0fe;
  --text2: #8899bb;
  --accent: #4d9fff;
  --accent2: #a78bfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: linear-gradient(160deg, var(--bg1), var(--bg2));
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* Animated background */
.bg-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
  animation: float 8s ease-in-out infinite;
}
.bg-orb1 { width: 300px; height: 300px; background: #4d9fff; top: -100px; right: -50px; }
.bg-orb2 { width: 250px; height: 250px; background: #a78bfa; bottom: 100px; left: -80px; animation-delay: -4s; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(20px)} }

.container {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 20px 16px;
  padding-bottom: 40px;
}

/* Search */
.search-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}
.search-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-size: 15px;
  font-family: 'Noto Sans SC', sans-serif;
  padding: 12px 16px;
  outline: none;
  backdrop-filter: blur(10px);
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text2); }
.search-input:focus { border-color: var(--accent); }
.search-btn, .locate-btn {
  width: 46px; height: 46px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
}
.search-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; }
.search-btn:hover, .locate-btn:hover { transform: scale(1.05); }

/* Main weather card */
.main-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 24px;
  margin-bottom: 16px;
  backdrop-filter: blur(20px);
  text-align: center;
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

.city-name {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text);
}
.city-date { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

.weather-icon { font-size: 72px; margin-bottom: 8px; line-height: 1; }
.temp-main {
  font-family: 'Syne', sans-serif;
  font-size: 64px;
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.weather-desc { font-size: 16px; color: var(--text2); margin-bottom: 20px; }

.temp-range {
  display: flex;
  justify-content: center;
  gap: 16px;
  font-size: 14px;
}
.temp-high { color: #fbbf24; }
.temp-low { color: var(--accent); }

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.5s ease;
}
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
.stat-icon { font-size: 20px; margin-bottom: 8px; }

/* Hourly forecast */
.section-title {
  font-size: 13px;
  color: var(--text2);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-left: 4px;
}
.hourly-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 16px;
  scrollbar-width: none;
}
.hourly-scroll::-webkit-scrollbar { display: none; }
.hour-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px 14px;
  text-align: center;
  min-width: 64px;
  backdrop-filter: blur(10px);
  flex-shrink: 0;
  animation: fadeIn 0.5s ease;
}
.hour-time { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.hour-icon { font-size: 22px; margin-bottom: 6px; }
.hour-temp { font-size: 14px; font-weight: 600; }

/* 7-day forecast */
.forecast-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.forecast-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.5s ease;
}
.forecast-day { font-size: 14px; min-width: 50px; }
.forecast-icon { font-size: 22px; }
.forecast-desc { flex: 1; font-size: 13px; color: var(--text2); }
.forecast-temps { display: flex; gap: 10px; font-size: 14px; }
.forecast-high { color: #fbbf24; font-weight: 600; }
.forecast-low { color: var(--accent); }

/* Loading & error */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  font-size: 15px;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to{transform:rotate(360deg)} }
.error-msg {
  text-align: center;
  padding: 40px 20px;
  color: #f87171;
  font-size: 14px;
  background: rgba(248,113,113,0.05);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 16px;
}
</style>
</head>
<body>
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<div class="container">
  <div class="search-bar">
    <input class="search-input" id="cityInput" type="text" placeholder="搜索城市…" onkeydown="if(event.key==='Enter')searchWeather()">
    <button class="locate-btn" onclick="getLocation()" title="定位">📍</button>
    <button class="search-btn" onclick="searchWeather()">🔍</button>
  </div>
  <div id="weatherContent">
    <div class="loading">
      <div class="loading-spinner"></div>
      正在获取天气数据…
    </div>
  </div>
</div>

<script>
const API_KEY = 'bd5e378503939ddaee76f12ad7a97608'; // OpenWeatherMap free key
const DAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function weatherIcon(code) {
  if (code >= 200 && code < 300) return '⛈️';
  if (code >= 300 && code < 400) return '🌦️';
  if (code >= 500 && code < 600) return '🌧️';
  if (code >= 600 && code < 700) return '❄️';
  if (code >= 700 && code < 800) return '🌫️';
  if (code === 800) return '☀️';
  if (code === 801) return '🌤️';
  if (code === 802) return '⛅';
  if (code >= 803) return '☁️';
  return '🌡️';
}

function formatDate(dt) {
  const d = new Date(dt * 1000);
  return `${DAYS[d.getDay()]} · ${d.getMonth()+1}月${d.getDate()}日`;
}

function formatHour(dt) {
  const d = new Date(dt * 1000);
  const h = d.getHours();
  return h === 0 ? '午夜' : h < 12 ? `${h}时` : h === 12 ? '正午' : `${h}时`;
}

async function fetchWeather(city) {
  showLoading();
  try {
    // Current weather
    const cur = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=zh_cn`);
    if (!cur.ok) throw new Error('城市未找到，请检查城市名称');
    const curData = await cur.json();

    // Forecast
    const fore = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=zh_cn`);
    const foreData = await fore.json();

    renderWeather(curData, foreData);
  } catch(e) {
    showError(e.message);
  }
}

async function fetchWeatherByCoords(lat, lon) {
  showLoading();
  try {
    const cur = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=zh_cn`);
    const curData = await cur.json();
    const fore = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=zh_cn`);
    const foreData = await fore.json();
    renderWeather(curData, foreData);
  } catch(e) {
    showError(e.message);
  }
}

function renderWeather(cur, fore) {
  const icon = weatherIcon(cur.weather[0].id);
  const desc = cur.weather[0].description;
  const temp = Math.round(cur.main.temp);
  const feels = Math.round(cur.main.feels_like);
  const humidity = cur.main.humidity;
  const wind = (cur.wind.speed * 3.6).toFixed(1);
  const visibility = cur.visibility ? (cur.visibility / 1000).toFixed(1) : '--';
  const pressure = cur.main.pressure;

  // Process hourly (next 8 x 3h)
  const hourly = fore.list.slice(0, 8);

  // Process daily (group by day)
  const dayMap = {};
  fore.list.forEach(item => {
    const d = new Date(item.dt * 1000);
    const key = `${d.getMonth()}-${d.getDate()}`;
    if (!dayMap[key]) dayMap[key] = { dt: item.dt, temps: [], icons: [], descs: [] };
    dayMap[key].temps.push(item.main.temp);
    dayMap[key].icons.push(item.weather[0].id);
    dayMap[key].descs.push(item.weather[0].description);
  });
  const daily = Object.values(dayMap).slice(0, 5);

  const now = new Date();
  const dateStr = `${now.getFullYear()}年${MONTHS[now.getMonth()]}${now.getDate()}日 ${DAYS[now.getDay()]}`;

  document.getElementById('weatherContent').innerHTML = `
    <div class="main-card">
      <div class="city-name">📍 ${cur.name}</div>
      <div class="city-date">${dateStr}</div>
      <div class="weather-icon">${icon}</div>
      <div class="temp-main">${temp}°</div>
      <div class="weather-desc">${desc} · 体感 ${feels}°</div>
      <div class="temp-range">
        <span class="temp-high">↑ ${Math.round(cur.main.temp_max)}°</span>
        <span class="temp-low">↓ ${Math.round(cur.main.temp_min)}°</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">💧</div>
        <div class="stat-label">湿度</div>
        <div class="stat-value">${humidity}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💨</div>
        <div class="stat-label">风速</div>
        <div class="stat-value">${wind}<span style="font-size:14px;font-weight:400"> km/h</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-label">能见度</div>
        <div class="stat-value">${visibility}<span style="font-size:14px;font-weight:400"> km</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🌡️</div>
        <div class="stat-label">气压</div>
        <div class="stat-value">${pressure}<span style="font-size:14px;font-weight:400"> hPa</span></div>
      </div>
    </div>

    <div class="section-title">今日逐时预报</div>
    <div class="hourly-scroll">
      ${hourly.map(h => `
        <div class="hour-card">
          <div class="hour-time">${formatHour(h.dt)}</div>
          <div class="hour-icon">${weatherIcon(h.weather[0].id)}</div>
          <div class="hour-temp">${Math.round(h.main.temp)}°</div>
        </div>
      `).join('')}
    </div>

    <div class="section-title">未来5天预报</div>
    <div class="forecast-list">
      ${daily.map(d => {
        const maxT = Math.round(Math.max(...d.temps));
        const minT = Math.round(Math.min(...d.temps));
        const ic = weatherIcon(d.icons[Math.floor(d.icons.length/2)]);
        const ds = d.descs[Math.floor(d.descs.length/2)];
        const day = new Date(d.dt * 1000);
        return `
          <div class="forecast-item">
            <div class="forecast-day">${DAYS[day.getDay()]}</div>
            <div class="forecast-icon">${ic}</div>
            <div class="forecast-desc">${ds}</div>
            <div class="forecast-temps">
              <span class="forecast-high">${maxT}°</span>
              <span class="forecast-low">${minT}°</span>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function showLoading() {
  document.getElementById('weatherContent').innerHTML = `
    <div class="loading">
      <div class="loading-spinner"></div>
      正在获取天气数据…
    </div>`;
}

function showError(msg) {
  document.getElementById('weatherContent').innerHTML = `
    <div class="error-msg">❌ ${msg}</div>`;
}

function searchWeather() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) return;
  fetchWeather(city);
}

function getLocation() {
  if (!navigator.geolocation) return showError('浏览器不支持定位');
  showLoading();
  navigator.geolocation.getCurrentPosition(
    pos => fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude),
    () => fetchWeather('Beijing')
  );
}

// Default load
fetchWeather('Beijing');
</script>
</body>
</html>
